version: '3.8'

services:
  auth-service:
    build: ./auth-service
    ports:
      - "5001:5001"

  product-service:
    build: ./product-service
    ports:
      - "5002:5002"
    depends_on:
      - mongo

  order-service:
    build: ./order-service
    ports:
      - "5003:5003"
    depends_on:
      - rabbitmq

  email-worker:
    build: ./email-worker
    depends_on:
      - rabbitmq

  mongo:
    image: mongo
    ports:
      - "27017:27017"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
